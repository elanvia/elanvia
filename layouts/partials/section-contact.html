<section class="contact" id="contact">
  <div class="section-header reveal">
    <span class="section-roman">V</span>
    <h2 class="section-title">Rester en lien</h2>
    <p class="section-script">Un mot, un appel, un signe</p>
  </div>
  <ul class="contact__list">
    <li class="reveal">
      <a href="tel:{{ .Site.Params.phone | replaceRE " " "" }}">
        <svg class="contact__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 8 C6 6 8 4 10 4 L13 4 L16 11 L13 14 C14 17 17 20 20 21 L23 18 L30 21 L30 24 C30 26 28 28 26 28 C16 28 6 18 6 8 Z"/>
        </svg>
        <span class="contact__label">Téléphone</span>
        <span class="contact__value">{{ .Site.Params.phoneDisplay }}</span>
      </a>
    </li>
    <li class="reveal">
      <a href="mailto:{{ .Site.Params.email }}">
        <svg class="contact__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="7" width="26" height="18" rx="2"/>
          <path d="M3 9 L16 19 L29 9"/>
        </svg>
        <span class="contact__label">Email</span>
        <span class="contact__value">{{ .Site.Params.email }}</span>
      </a>
    </li>
    <li class="reveal">
      <a href="{{ .Site.Params.instagram }}" target="_blank" rel="noopener">
        <svg class="contact__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="5" y="5" width="22" height="22" rx="6"/>
          <circle cx="16" cy="16" r="5"/>
          <circle cx="23" cy="9" r="1.2" fill="currentColor"/>
        </svg>
        <span class="contact__label">Instagram</span>
        <span class="contact__value">{{ .Site.Params.instagramHandle }}</span>
      </a>
    </li>
    <li class="reveal">
      <a href="{{ .Site.Params.facebook }}" target="_blank" rel="noopener">
        <svg class="contact__icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 8 L23 8 L23 4 L19 4 C16 4 14 6 14 9 L14 12 L11 12 L11 16 L14 16 L14 28 L18 28 L18 16 L22 16 L23 12 L18 12 L18 10 C18 9 18 8 19 8 Z"/>
        </svg>
        <span class="contact__label">Facebook</span>
        <span class="contact__value">{{ .Site.Params.facebookHandle }}</span>
      </a>
    </li>
  </ul>
</section>
