<section class="hero" id="accueil">
  <div class="hero__frame">
    <div class="hero__perforations" aria-hidden="true"></div>
    <div class="hero__inner reveal">
      <p class="eyebrow">Élanvia · Carnet d'accompagnement</p>
      <div class="hero__logo">
        <img src="{{ "images/logo.png" | relURL }}" alt="Logo Elanvia — tortue aquarelle, cœur yin-yang, arc-en-ciel" width="380" height="570" loading="eager">
      </div>
      <h1 class="hero__title">
        <span class="hero__title-script">Elanvia</span>
        <span class="hero__title-line">Accompagnement vers l'équilibre</span>
      </h1>
      <p class="hero__baseline">Remettre de la douceur<br>dans des vies trop dures.</p>
      <div class="hero__cta">
        <a href="#rdv" class="btn btn--primary">Prendre rendez-vous</a>
        <a href="#offre" class="btn btn--ghost">Découvrir l'offre</a>
      </div>
    </div>
  </div>
  <div class="hero__wash" aria-hidden="true">
    {{ $wash := resources.Get "svg/wash-rainbow.svg" }}
    {{ $wash.Content | safeHTML }}
  </div>
</section>
